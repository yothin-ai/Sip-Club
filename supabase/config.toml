project_id = "sip-club"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
# Anonymous/guest auth is the default per README.md section 3 — sign-up is an
# optional upgrade, never a gate.
enable_anonymous_sign_ins = true
enable_signup = true

[storage]
enabled = true
file_size_limit = "10MiB"

[storage.buckets.bag-photos]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[functions.analyze-bag]
verify_jwt = true
